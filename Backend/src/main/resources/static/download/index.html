<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Téléchargement - Contribuable</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f7fb;
            color: #1f2937;
        }

        .card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 22px;
        }

        p {
            margin: 0 0 16px;
            color: #4b5563;
        }

        .row {
            margin-bottom: 14px;
            font-size: 14px;
            color: #374151;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background: #2563eb;
            color: #ffffff;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .hidden {
            display: none;
        }

        .error {
            color: #b91c1c;
            font-size: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin: 20px 0 10px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            color: #1f2937;
        }

        .pdf-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .pdf-list li {
            margin-bottom: 8px;
        }

        .pdf-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: #f3f4f6;
            color: #374151;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .pdf-btn:hover {
            background: #e5e7eb;
        }

        .pdf-icon {
            font-size: 18px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Contribuable</h1>
    <p>Téléchargez la dernière version Android de l'application Contribuable.</p>

    <div id="fileInfo" class="row hidden"></div>
    <div id="error" class="error hidden"></div>

    <a id="downloadBtn" class="btn hidden" href="#">Télécharger l'APK</a>

    <div id="pdfSection" class="hidden">
        <p class="section-title">Documents PDF</p>
        <ul id="pdfList" class="pdf-list"></ul>
    </div>
</div>

<script>
    async function loadLatestApk() {
        const fileInfo = document.getElementById('fileInfo');
        const error = document.getElementById('error');
        const downloadBtn = document.getElementById('downloadBtn');

        try {
            const response = await fetch('/api/apk/latest');
            if (!response.ok) {
                throw new Error('Aucun fichier APK n\'est disponible pour le moment.');
            }

            const data = await response.json();
            fileInfo.textContent = `Fichier disponible : ${data.fileName}`;
            fileInfo.classList.remove('hidden');

            downloadBtn.href = `/api/apk/download/${encodeURIComponent(data.fileName)}`;
            downloadBtn.classList.remove('hidden');
        } catch (e) {
            error.textContent = e.message || 'Impossible de charger les informations de téléchargement.';
            error.classList.remove('hidden');
        }
    }

    async function loadPdfs() {
        try {
            const response = await fetch('/api/apk/pdfs');
            if (!response.ok) return;
            const pdfs = await response.json();
            if (pdfs.length === 0) return;

            const pdfList = document.getElementById('pdfList');
            pdfs.forEach(pdf => {
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.className = 'pdf-btn';
                a.href = `/api/apk/download/${encodeURIComponent(pdf.fileName)}`;
                a.innerHTML = `<span class="pdf-icon">📄</span> ${pdf.fileName}`;
                li.appendChild(a);
                pdfList.appendChild(li);
            });
            document.getElementById('pdfSection').classList.remove('hidden');
        } catch (e) {
            // silently ignore
        }
    }

    loadLatestApk();
    loadPdfs();
</script>
</body>
</html>
